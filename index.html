<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Banner Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    #dropzone {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #555;
      cursor: pointer;
    }

    #dropzone.hover {
      border-color: #00ffcc;
      background: rgba(0,255,200,0.05);
    }

    #dropzone span {
      font-size: 20px;
      opacity: 0.7;
    }

    #viewer {
      display: none;
      padding: 20px;
      gap: 20px;
      flex-wrap: wrap;
    }

    iframe {
      border: 1px solid #333;
      background: white;
    }
  </style>
</head>
<body>

<div id="dropzone">
  <span>Drop ZIP file here</span>
</div>

<div id="viewer"></div>

<script>
const dropzone = document.getElementById('dropzone');
const viewer = document.getElementById('viewer');

function preventDefaults(e) {
  e.preventDefault();
  e.stopPropagation();
}

['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
  dropzone.addEventListener(eventName, preventDefaults, false);
});

['dragenter', 'dragover'].forEach(() => {
  dropzone.classList.add('hover');
});

['dragleave', 'drop'].forEach(() => {
  dropzone.classList.remove('hover');
});

dropzone.addEventListener('drop', async (e) => {
  const file = e.dataTransfer.files[0];
  if (!file || !file.name.endsWith('.zip')) return;

  const zip = await JSZip.loadAsync(file);
  viewer.innerHTML = '';

  const fileMap = {};

  // Create Blob URLs for ALL files
  await Promise.all(Object.keys(zip.files).map(async (path) => {
    const entry = zip.files[path];
    if (!entry.dir) {
      const blob = await entry.async('blob');
      fileMap[path] = URL.createObjectURL(blob);
    }
  }));

  const htmlFiles = Object.keys(zip.files).filter(p => p.endsWith('.html'));

  for (const path of htmlFiles) {
    const entry = zip.files[path];
    let content = await entry.async('string');

    // Fix relative paths
    const basePath = path.substring(0, path.lastIndexOf('/') + 1);

    content = content.replace(/(src|href)=["']([^"']+)["']/g, (match, attr, url) => {
      if (url.startsWith('http') || url.startsWith('data:')) return match;

      const fullPath = basePath + url;
      const normalized = fullPath.replace(/\.\//g, '');

      if (fileMap[normalized]) {
        return `${attr}="${fileMap[normalized]}"`;
      }

      return match;
    });

    const iframe = document.createElement('iframe');
    iframe.width = 320;
    iframe.height = 250;

    const blob = new Blob([content], { type: 'text/html' });
    iframe.src = URL.createObjectURL(blob);

    viewer.appendChild(iframe);
  }

  dropzone.style.display = 'none';
  viewer.style.display = 'flex';
});
</script>

</body>
</html>
