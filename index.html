<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Banner Viewer</title>
    <!-- Load thư viện JSZip & html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            background-color: #ffffff;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }

        body.dragover {
            background-color: #f8fafc;
        }
        body.dragover::after {
            content: '';
            position: fixed;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 3px dashed #000;
            pointer-events: none;
            z-index: 9999;
        }

        #instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 1.2rem;
            text-align: center;
            pointer-events: none;
            z-index: 0;
        }

        #file-input { display: none; }

        #gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px; 
            width: 100%;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }

        .banner-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .iframe-wrapper {
            border: 1px solid #000;
            background-color: #fff;
            position: relative;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .banner-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }

        .banner-name {
            font-size: 11px;
            color: #000;
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
            margin-right: 10px;
            text-align: left;
        }

        .btn-group {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .btn-icon {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .btn-icon:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="instruction">
        Kéo thả file ZIP hoặc file HTML vào bất kỳ đâu trên trang
        <br>
        <span style="font-size: 0.9rem; cursor: pointer; pointer-events: auto; text-decoration: underline;" onclick="document.getElementById('file-input').click()">
            hoặc click để chọn file
        </span>
    </div>
    
    <!-- Cập nhật thẻ input hỗ trợ thêm .html -->
    <input type="file" id="file-input" accept=".zip, .html" multiple>
    <div id="gallery"></div>

    <script>
        const body = document.body;
        const fileInput = document.getElementById('file-input');
        const gallery = document.getElementById('gallery');
        const instruction = document.getElementById('instruction');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            body.addEventListener(eventName, e => {
                e.preventDefault(); e.stopPropagation();
            }, false);
        });

        body.addEventListener('dragenter', () => body.classList.add('dragover'));
        body.addEventListener('dragover', () => body.classList.add('dragover'));
        body.addEventListener('dragleave', (e) => {
            if (e.target === body) body.classList.remove('dragover');
        });

        body.addEventListener('drop', (e) => {
            body.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(this.files); this.value = ''; 
        });

        function handleFiles(files) {
            let validFileFound = false;
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.name.toLowerCase().endsWith('.zip')) {
                    validFileFound = true;
                    processZip(file);
                } else if (file.name.toLowerCase().endsWith('.html')) {
                    validFileFound = true;
                    processHtmlFile(file); // Xử lý file html rời
                }
            }
            if (validFileFound) instruction.style.display = 'none';
        }

        // --- XỬ LÝ FILE HTML ĐƠN LẺ ---
        async function processHtmlFile(file) {
            try {
                const htmlText = await file.text();
                const initSize = getBannerSize(htmlText);
                renderBanner(htmlText, file.name, initSize);
            } catch (error) {
                alert("Lỗi khi đọc file HTML: " + file.name);
            }
        }

        function getMimeType(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const mimeMap = { svg:'image/svg+xml', png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg', gif:'image/gif', webp:'image/webp', css:'text/css', js:'text/javascript', json:'application/json' };
            return mimeMap[ext] || 'application/octet-stream';
        }

        function getBannerSize(html) {
            let width = 300, height = 250;
            const metaMatch = html.match(/<meta\s+[^>]*name=["']ad\.size["'][^>]*>/i);
            if (metaMatch) {
                const wMatch = metaMatch[0].match(/width\s*=\s*(\d+)/i);
                const hMatch = metaMatch[0].match(/height\s*=\s*(\d+)/i);
                if (wMatch) width = parseInt(wMatch[1], 10);
                if (hMatch) height = parseInt(hMatch[1], 10);
                return { width, height };
            }
            const canvasMatch = html.match(/<canvas[^>]*width=["']?(\d+)px["']?[^>]*height=["']?(\d+)px["']?[^>]*>/i) || html.match(/<canvas[^>]*width=["'](\d+)["'][^>]*height=["'](\d+)["'][^>]*>/i);
            if (canvasMatch) {
                width = parseInt(canvasMatch[1], 10);
                height = parseInt(canvasMatch[2], 10);
                return { width, height };
            }
            const styleMatch = html.match(/width\s*:\s*(\d+)px.*?height\s*:\s*(\d+)px/i);
            if (styleMatch) {
                width = parseInt(styleMatch[1], 10);
                height = parseInt(styleMatch[2], 10);
            }
            return { width, height };
        }

        async function processZip(file) {
            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(file);
                const fileBlobs = {};
                const htmlFiles =[];

                for (const filename of Object.keys(contents.files)) {
                    if (filename.includes('__MACOSX') || filename.includes('.DS_Store')) continue;
                    const fileObj = contents.files[filename];
                    if (!fileObj.dir) {
                        if (filename.endsWith('.html')) htmlFiles.push(filename);
                        else {
                            const uint8array = await fileObj.async("uint8array");
                            const blob = new Blob([uint8array], { type: getMimeType(filename) });
                            fileBlobs[filename] = URL.createObjectURL(blob);
                        }
                    }
                }

                for (const filename of htmlFiles) {
                    let htmlText = await contents.files[filename].async("text");
                    const basePath = filename.substring(0, filename.lastIndexOf('/') + 1);

                    for (const assetPath in fileBlobs) {
                        let relativePath = assetPath.startsWith(basePath) ? assetPath.substring(basePath.length) : assetPath;
                        const blobUrl = fileBlobs[assetPath];
                        
                        htmlText = htmlText.split(`"${relativePath}"`).join(`"${blobUrl}"`);
                        htmlText = htmlText.split(`'${relativePath}'`).join(`'${blobUrl}'`);
                        htmlText = htmlText.split(`"./${relativePath}"`).join(`"${blobUrl}"`);
                        htmlText = htmlText.split(`'./${relativePath}'`).join(`'${blobUrl}'`);
                        
                        htmlText = htmlText.split(`url(${relativePath})`).join(`url(${blobUrl})`);
                        htmlText = htmlText.split(`url('${relativePath}')`).join(`url('${blobUrl}')`);
                        htmlText = htmlText.split(`url("${relativePath}")`).join(`url("${blobUrl}")`);
                    }

                    const initSize = getBannerSize(htmlText);
                    
                    // Lấy Tên File ZIP làm tên Frame. (Nếu có nhiều file html trong 1 zip thì nối thêm tên để phân biệt)
                    const displayName = htmlFiles.length === 1 ? file.name : `${file.name} - ${filename.split('/').pop()}`;

                    renderBanner(htmlText, displayName, initSize);
                }
            } catch (error) {
                alert("Lỗi khi đọc file: " + file.name);
            }
        }

        function renderBanner(htmlContent, displayName, initSize) {
            const item = document.createElement('div');
            item.className = 'banner-item';

            const wrapper = document.createElement('div');
            wrapper.className = 'iframe-wrapper';
            wrapper.style.width = initSize.width + 'px';
            wrapper.style.height = initSize.height + 'px';

            const controls = document.createElement('div');
            controls.className = 'banner-controls';
            controls.style.width = initSize.width + 'px';

            let iframe; 

            const loadIframe = () => {
                if (iframe) iframe.remove(); 
                iframe = document.createElement('iframe');
                iframe.scrolling = "no";
                iframe.srcdoc = htmlContent;
                
                iframe.onload = () => {
                    try {
                        const doc = iframe.contentWindow.document;
                        let w = initSize.width;
                        let h = initSize.height;

                        const meta = doc.querySelector('meta[name="ad.size"]');
                        if (meta) {
                            const wM = meta.content.match(/width\s*=\s*(\d+)/i);
                            const hM = meta.content.match(/height\s*=\s*(\d+)/i);
                            if(wM && hM) { w = parseInt(wM[1]); h = parseInt(hM[1]); }
                        } else {
                            const canvas = doc.querySelector('canvas');
                            if (canvas && canvas.width) { w = canvas.width; h = canvas.height; }
                        }

                        if (w && h && !isNaN(w) && !isNaN(h)) {
                            wrapper.style.width = w + 'px';
                            wrapper.style.height = h + 'px';
                            controls.style.width = w + 'px';
                        }
                    } catch(e) { }
                };
                
                wrapper.appendChild(iframe);
            };

            loadIframe(); 

            // -- Giao Diện Điều Khiển --
            const title = document.createElement('div');
            title.className = 'banner-name';
            title.title = displayName; 
            title.innerText = displayName;

            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            // 1. Nút Capture
            const btnCapture = document.createElement('button');
            btnCapture.className = 'btn-icon';
            btnCapture.title = 'Chụp ảnh Frame';
            btnCapture.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>';
            btnCapture.onclick = async () => {
                try {
                    const innerDoc = iframe.contentDocument || iframe.contentWindow.document;
                    const bWidth = wrapper.offsetWidth;
                    const bHeight = wrapper.offsetHeight;

                    const canvasEl = innerDoc.querySelector('canvas');
                    if (canvasEl) {
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = bWidth;
                        tempCanvas.height = bHeight;
                        const ctx = tempCanvas.getContext('2d');
                        
                        ctx.fillStyle = '#ffffff'; 
                        try {
                            const bodyBg = iframe.contentWindow.getComputedStyle(innerDoc.body).backgroundColor;
                            if (bodyBg && bodyBg !== 'rgba(0, 0, 0, 0)' && bodyBg !== 'transparent') ctx.fillStyle = bodyBg;
                            
                            const container = innerDoc.getElementById('animation_container') || canvasEl.parentElement;
                            if (container) {
                                const cBg = iframe.contentWindow.getComputedStyle(container).backgroundColor;
                                if (cBg && cBg !== 'rgba(0, 0, 0, 0)' && cBg !== 'transparent') ctx.fillStyle = cBg;
                            }
                        } catch(e) {}
                        
                        ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                        ctx.drawImage(canvasEl, 0, 0, tempCanvas.width, tempCanvas.height);
                        
                        downloadImage(tempCanvas.toDataURL('image/png'));
                        return;
                    }

                    const renderedCanvas = await html2canvas(innerDoc.body, {
                        useCORS: true,
                        allowTaint: true,
                        backgroundColor: '#ffffff',
                        width: bWidth,
                        height: bHeight,
                        scale: 1, 
                        x: 0,
                        y: 0
                    });
                    
                    downloadImage(renderedCanvas.toDataURL('image/png'));

                } catch (err) {
                    alert("Lỗi chụp ảnh: " + err.message);
                }
            };

            function downloadImage(dataUrl) {
                const link = document.createElement('a');
                // Tên file ảnh tải xuống sẽ trùng với tên file ZIP hoặc HTML của nó
                link.download = `capture_${displayName.replace('.zip', '').replace('.html', '')}_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
            }

            // 2. Nút Refresh 
            const btnRefresh = document.createElement('button');
            btnRefresh.className = 'btn-icon';
            btnRefresh.title = 'Chạy lại Animation';
            btnRefresh.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path></svg>';
            btnRefresh.onclick = () => { loadIframe(); };

            // 3. Nút Đóng
            const btnClose = document.createElement('button');
            btnClose.className = 'btn-icon';
            btnClose.title = 'Đóng';
            btnClose.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
            btnClose.onclick = () => item.remove();

            btnGroup.appendChild(btnCapture);
            btnGroup.appendChild(btnRefresh);
            btnGroup.appendChild(btnClose);

            controls.appendChild(title);
            controls.appendChild(btnGroup);

            item.appendChild(wrapper);
            item.appendChild(controls);
            gallery.appendChild(item); 
        }
    </script>
</body>
</html>
