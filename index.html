<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Banner Viewer</title>
    <!-- Load thư viện JSZip từ CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #F3F4F6;
            --text: #1F2937;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        #drop-zone {
            width: 100%;
            max-width: 800px;
            height: 300px;
            border: 3px dashed #9CA3AF;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: white;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #drop-zone.dragover {
            border-color: var(--primary);
            background-color: #EEF2FF;
            transform: scale(1.02);
        }
        #drop-zone.minimized {
            height: 100px; 
        }
        #drop-zone p {
            font-size: 1.2rem;
            color: #6B7280;
            pointer-events: none;
        }
        #drop-zone svg {
            width: 48px;
            height: 48px;
            color: #9CA3AF;
            margin-bottom: 10px;
            pointer-events: none;
        }
        #file-input { display: none; }

        #gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }
        .banner-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }
        .banner-header {
            font-size: 0.85rem;
            color: #4B5563;
            margin-bottom: 8px;
            word-break: break-all;
            padding-bottom: 8px;
            border-bottom: 1px solid #E5E7EB;
        }
        .iframe-wrapper {
            width: 300px; 
            height: 250px;
            resize: both;
            overflow: hidden;
            border: 1px solid #E5E7EB;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #loading {
            display: none;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="drop-zone">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
        <p>Kéo thả file ZIP chứa banners vào đây</p>
        <p style="font-size: 0.9rem; margin-top: 5px;">hoặc click để chọn file</p>
        <input type="file" id="file-input" accept=".zip">
    </div>

    <div id="loading">Đang giải nén và xử lý banners...</div>
    
    <div id="gallery"></div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('loading');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].name.endsWith('.zip')) {
                processZip(files[0]);
            } else {
                alert("Vui lòng thả file ZIP!");
            }
        });

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) processZip(e.target.files[0]);
        });

        function getMimeType(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            switch (ext) {
                case 'svg': return 'image/svg+xml';
                case 'png': return 'image/png';
                case 'jpg': 
                case 'jpeg': return 'image/jpeg';
                case 'gif': return 'image/gif';
                case 'webp': return 'image/webp';
                case 'css': return 'text/css';
                case 'js': return 'text/javascript';
                case 'json': return 'application/json';
                default: return 'application/octet-stream';
            }
        }

        async function processZip(file) {
            loading.style.display = 'block';
            gallery.innerHTML = '';
            dropZone.classList.add('minimized');
            dropZone.querySelector('p').innerText = "Kéo thả file ZIP khác để xem mới";

            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(file);
                
                const fileBlobs = {};
                const htmlFiles =[];

                // Bước 1: Đọc files, tạo Blob kèm MIME type chuẩn xác
                for (const filename of Object.keys(contents.files)) {
                    if (filename.includes('__MACOSX') || filename.includes('.DS_Store')) continue;
                    
                    const fileObj = contents.files[filename];
                    if (!fileObj.dir) {
                        if (filename.endsWith('.html')) {
                            htmlFiles.push(filename);
                        } else {
                            const mimeType = getMimeType(filename);
                            // Lấy dữ liệu dưới dạng mảng byte thay vì blob mặc định để ép MIME Type
                            const uint8array = await fileObj.async("uint8array");
                            const blob = new Blob([uint8array], { type: mimeType });
                            fileBlobs[filename] = URL.createObjectURL(blob);
                        }
                    }
                }

                // Bước 2: Thay thế links trong file HTML
                for (const filename of htmlFiles) {
                    let htmlText = await contents.files[filename].async("text");
                    const basePath = filename.substring(0, filename.lastIndexOf('/') + 1);

                    for (const assetPath in fileBlobs) {
                        let relativeAssetPath = assetPath;
                        if (assetPath.startsWith(basePath)) {
                            relativeAssetPath = assetPath.substring(basePath.length);
                        }

                        const blobUrl = fileBlobs[assetPath];
                        const url1 = relativeAssetPath;
                        const url2 = "./" + relativeAssetPath;

                        // Thay thế mọi trường hợp đường dẫn có thể có (dùng split.join an toàn hơn RegExp với ký tự đặc biệt)
                        htmlText = htmlText.split(`"${url1}"`).join(`"${blobUrl}"`);
                        htmlText = htmlText.split(`'${url1}'`).join(`'${blobUrl}'`);
                        htmlText = htmlText.split(`"${url2}"`).join(`"${blobUrl}"`);
                        htmlText = htmlText.split(`'${url2}'`).join(`'${blobUrl}'`);
                        
                        // Thay thế trong css dạng url(image.svg)
                        htmlText = htmlText.split(`url(${url1})`).join(`url(${blobUrl})`);
                        htmlText = htmlText.split(`url('${url1}')`).join(`url('${blobUrl}')`);
                        htmlText = htmlText.split(`url("${url1}")`).join(`url("${blobUrl}")`);
                        
                        htmlText = htmlText.split(`url(${url2})`).join(`url(${blobUrl})`);
                        htmlText = htmlText.split(`url('${url2}')`).join(`url('${blobUrl}')`);
                        htmlText = htmlText.split(`url("${url2}")`).join(`url("${blobUrl}")`);
                    }

                    renderBanner(htmlText, filename);
                }

                if (htmlFiles.length === 0) {
                    alert("Không tìm thấy file .html nào trong file ZIP!");
                }

            } catch (error) {
                console.error(error);
                alert("Có lỗi xảy ra khi đọc file ZIP.");
            } finally {
                loading.style.display = 'none';
                fileInput.value = "";
            }
        }

        function renderBanner(htmlContent, filePath) {
            const card = document.createElement('div');
            card.className = 'banner-card';

            const header = document.createElement('div');
            header.className = 'banner-header';
            header.innerText = filePath; 

            const wrapper = document.createElement('div');
            wrapper.className = 'iframe-wrapper';

            const iframe = document.createElement('iframe');
            iframe.srcdoc = htmlContent;

            wrapper.appendChild(iframe);
            card.appendChild(header);
            card.appendChild(wrapper);
            gallery.appendChild(card);
        }
    </script>
</body>
</html>
