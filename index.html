<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Banner Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            background-color: #ffffff;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }

        body.dragover { background-color: #f8fafc; }
        body.dragover::after {
            content: ''; position: fixed;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 3px dashed #000; pointer-events: none; z-index: 9999;
        }

        #instruction {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #666; font-size: 1.2rem; text-align: center;
            pointer-events: none; z-index: 0;
        }

        #file-input { display: none; }

        #gallery {
            display: flex; flex-wrap: wrap; gap: 20px;
            width: 100%; justify-content: center; align-items: flex-start;
            position: relative; z-index: 1;
        }

        .banner-item {
            display: flex; flex-direction: column; align-items: center;
        }

        .iframe-wrapper {
            border: 1px solid #000;
            background-color: #fff;
            position: relative;
        }

        iframe {
            width: 100%; height: 100%;
            border: none; display: block;
        }

        /* Toolbar điều khiển */
        .controls-row {
            display: flex; align-items: center;
            margin-top: 5px; gap: 4px; /* sát nhau */
        }

        /* Box chứa tên file */
        .name-box {
            flex-grow: 1;
            font-size: 10.4px;
            color: #000;
            font-family: monospace;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: default;
        }

        /* Animation chạy qua chạy lại khi Hover */
        @keyframes scrollText {
            0% { text-indent: 0px; }
            100% { text-indent: var(--scroll-dist); }
        }

        /* Nút công cụ siêu tối giản */
        .btn-icon {
            cursor: pointer;
            background: transparent;
            border: none;
            color: #000;
            padding: 2px;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .btn-icon:hover { opacity: 0.5; }
    </style>
</head>
<body>

    <div id="instruction">
        Kéo thả file ZIP hoặc file HTML vào đây
        <br>
        <span style="font-size: 0.9rem; cursor: pointer; pointer-events: auto; text-decoration: underline;" onclick="document.getElementById('file-input').click()">
            hoặc click để chọn file
        </span>
    </div>
    
    <input type="file" id="file-input" accept=".zip, .html" multiple>
    <div id="gallery"></div>

    <script>
        const body = document.body;
        const fileInput = document.getElementById('file-input');
        const gallery = document.getElementById('gallery');
        const instruction = document.getElementById('instruction');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            body.addEventListener(eventName, e => {
                e.preventDefault(); e.stopPropagation();
            }, false);
        });

        body.addEventListener('dragenter', () => body.classList.add('dragover'));
        body.addEventListener('dragover', () => body.classList.add('dragover'));
        body.addEventListener('dragleave', (e) => {
            if (e.target === body) body.classList.remove('dragover');
        });

        body.addEventListener('drop', (e) => {
            body.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(this.files); this.value = ''; 
        });

        function handleFiles(files) {
            let validFileFound = false;
            for (let i = 0; i < files.length; i++) {
                if (files[i].name.toLowerCase().endsWith('.zip')) {
                    validFileFound = true; processZip(files[i]);
                } else if (files[i].name.toLowerCase().endsWith('.html')) {
                    validFileFound = true; processHtmlFile(files[i]);
                }
            }
            if (validFileFound) instruction.style.display = 'none';
        }

        async function processHtmlFile(file) {
            try {
                let htmlText = await file.text();
                const size = getBannerSize(htmlText);
                htmlText = injectFreezeScript(htmlText);
                renderBanner(htmlText, file.name, size);
            } catch(e) { console.error(e); }
        }

        async function processZip(file) {
            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(file);
                const fileBlobs = {}; const htmlFiles =[];

                for (const filename of Object.keys(contents.files)) {
                    if (filename.includes('__MACOSX') || filename.includes('.DS_Store')) continue;
                    const fileObj = contents.files[filename];
                    if (!fileObj.dir) {
                        if (filename.endsWith('.html')) {
                            htmlFiles.push(filename);
                        } else {
                            const ext = filename.split('.').pop().toLowerCase();
                            const mimeMap = { svg:'image/svg+xml', png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg', gif:'image/gif', css:'text/css', js:'text/javascript' };
                            const mimeType = mimeMap[ext] || 'application/octet-stream';
                            
                            const uint8array = await fileObj.async("uint8array");
                            const blob = new Blob([uint8array], { type: mimeType });
                            fileBlobs[filename] = URL.createObjectURL(blob);
                        }
                    }
                }

                for (const filename of htmlFiles) {
                    let htmlText = await contents.files[filename].async("text");
                    const basePath = filename.substring(0, filename.lastIndexOf('/') + 1);

                    for (const assetPath in fileBlobs) {
                        let relativePath = assetPath.startsWith(basePath) ? assetPath.substring(basePath.length) : assetPath;
                        const blobUrl = fileBlobs[assetPath];
                        
                        htmlText = htmlText.split(`"${relativePath}"`).join(`"${blobUrl}"`);
                        htmlText = htmlText.split(`'${relativePath}'`).join(`'${blobUrl}'`);
                        htmlText = htmlText.split(`"./${relativePath}"`).join(`"${blobUrl}"`);
                        htmlText = htmlText.split(`'./${relativePath}'`).join(`'${blobUrl}'`);
