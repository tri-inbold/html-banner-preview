<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Banner Viewer</title>
    <!-- Load thư viện JSZip từ CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* Reset và thiết lập toàn bộ trang làm vùng thả file */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            background-color: #ffffff;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }

        /* Hiệu ứng viền đứt nét viền quanh trang khi đang kéo file vào */
        body.dragover {
            background-color: #f8fafc;
        }
        body.dragover::after {
            content: '';
            position: fixed;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 3px dashed #000;
            pointer-events: none;
            z-index: 9999;
        }

        /* Chữ hướng dẫn lúc đầu */
        #instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 1.2rem;
            text-align: center;
            pointer-events: none;
            z-index: 0;
        }

        #file-input {
            display: none;
        }

        /* Container chứa các banners */
        #gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }

        /* Tối giản thiết kế banner */
        .banner-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px; /* Khoảng cách giữa box HTML và tên */
        }

        .iframe-wrapper {
            border: 1px solid #000; /* Đúng 1 viền outline đen theo yêu cầu */
            background-color: #fff;
            /* width và height sẽ được inject tự động qua JS */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .banner-name {
            font-size: 13px;
            color: #000;
            word-break: break-all;
            max-width: 100%;
            text-align: center;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="instruction">
        Kéo thả (các) file ZIP vào bất kỳ đâu trên trang
        <br>
        <span style="font-size: 0.9rem; cursor: pointer; pointer-events: auto; text-decoration: underline;" onclick="document.getElementById('file-input').click()">
            hoặc click để chọn file
        </span>
    </div>
    
    <input type="file" id="file-input" accept=".zip" multiple>
    <div id="gallery"></div>

    <script>
        const body = document.body;
        const fileInput = document.getElementById('file-input');
        const gallery = document.getElementById('gallery');
        const instruction = document.getElementById('instruction');

        // Lắng nghe sự kiện Drag & Drop trên TOÀN BỘ trang (body)
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        body.addEventListener('dragenter', () => body.classList.add('dragover'));
        body.addEventListener('dragover', () => body.classList.add('dragover'));
        body.addEventListener('dragleave', (e) => {
            if (e.target === body) body.classList.remove('dragover');
        });

        body.addEventListener('drop', (e) => {
            body.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
            this.value = ''; // Reset để có thể chọn lại đúng file đó
        });

        function handleFiles(files) {
            let zipFound = false;
            // Cho phép lặp qua nhiều file zip được chọn/thả cùng 1 lúc
            for (let i = 0; i < files.length; i++) {
                if (files[i].name.endsWith('.zip')) {
                    zipFound = true;
                    processZip(files[i]);
                }
            }
            if (zipFound) {
                instruction.style.display = 'none'; // Ẩn hướng dẫn khi bắt đầu có file
            }
        }

        function getMimeType(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            switch (ext) {
                case 'svg': return 'image/svg+xml';
                case 'png': return 'image/png';
                case 'jpg': 
                case 'jpeg': return 'image/jpeg';
                case 'gif': return 'image/gif';
                case 'webp': return 'image/webp';
                case 'css': return 'text/css';
                case 'js': return 'text/javascript';
                case 'json': return 'application/json';
                default: return 'application/octet-stream';
            }
        }

        // THUẬT TOÁN ĐỌC KÍCH THƯỚC BANNER TỪ BÊN TRONG MÃ NGUỒN HTML
        function getBannerSize(html) {
            let width = 300;  // Kích thước mặc định nếu không tìm thấy
            let height = 250;
            
            // 1. Tìm theo chuẩn IAB: <meta name="ad.size" content="width=300,height=250">
            const metaTagRegex = /<meta\s+[^>]*name=["']ad\.size["'][^>]*>/i;
            const metaMatch = html.match(metaTagRegex);
            
            if (metaMatch) {
                const contentMatch = metaMatch[0].match(/content=["']([^"']+)["']/i);
                if (contentMatch) {
                    const contentParams = contentMatch[1];
                    const wMatch = contentParams.match(/width\s*=\s*(\d+)/i);
                    const hMatch = contentParams.match(/height\s*=\s*(\d+)/i);
                    if (wMatch) width = parseInt(wMatch[1], 10);
                    if (hMatch) height = parseInt(hMatch[1], 10);
                }
            } else {
                // 2. Tìm theo chuẩn Adobe Animate HTML5 Canvas: <canvas width="300" height="250">
                const canvasMatch = html.match(/<canvas[^>]*width=["'](\d+)["'][^>]*height=["'](\d+)["'][^>]*>/i);
                if (canvasMatch) {
                    width = parseInt(canvasMatch[1], 10);
                    height = parseInt(canvasMatch[2], 10);
                } else {
                    // 3. Fallback: Cố gắng quét CSS inline dạng width:300px; height:250px;
                    const cssWidthMatch = html.match(/width\s*:\s*(\d+)px/i);
                    const cssHeightMatch = html.match(/height\s*:\s*(\d+)px/i);
                    if (cssWidthMatch && cssHeightMatch) {
                        width = parseInt(cssWidthMatch[1], 10);
                        height = parseInt(cssHeightMatch[1], 10);
                    }
                }
            }
            return { width, height };
        }

        async function processZip(file) {
            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(file);
                
                const fileBlobs = {};
                const htmlFiles =[];

                for (const filename of Object.keys(contents.files)) {
                    if (filename.includes('__MACOSX') || filename.includes('.DS_Store')) continue;
                    
                    const fileObj = contents.files[filename];
                    if (!fileObj.dir) {
                        if (filename.endsWith('.html')) {
                            htmlFiles.push(filename);
                        } else {
                            const mimeType = getMimeType(filename);
                            const uint8array = await fileObj.async("uint8array");
                            const blob = new Blob([uint8array], { type: mimeType });
                            fileBlobs[filename] = URL.createObjectURL(blob);
                        }
                    }
                }

                for (const filename of htmlFiles) {
                    let htmlText = await contents.files[filename].async("text");
                    const basePath = filename.substring(0, filename.lastIndexOf('/') + 1);

                    for (const assetPath in fileBlobs) {
                        let relativeAssetPath = assetPath;
                        if (assetPath.startsWith(basePath)) {
                            relativeAssetPath = assetPath.substring(basePath.length);
                        }

                        const blobUrl = fileBlobs[assetPath];
                        const url1 = relativeAssetPath;
                        const url2 = "./" + relativeAssetPath;

                        htmlText = htmlText.split(`"${url1}"`).join(`"${blobUrl}"`);
                        htmlText = htmlText.split(`'${url1}'`).join(`'${blobUrl}'`);
                        htmlText = htmlText.split(`"${url2}"`).join(`"${blobUrl}"`);
                        htmlText = htmlText.split(`'${url2}'`).join(`'${blobUrl}'`);
                        
                        htmlText = htmlText.split(`url(${url1})`).join(`url(${blobUrl})`);
                        htmlText = htmlText.split(`url('${url1}')`).join(`url('${blobUrl}')`);
                        htmlText = htmlText.split(`url("${url1}")`).join(`url("${blobUrl}")`);
                        
                        htmlText = htmlText.split(`url(${url2})`).join(`url(${blobUrl})`);
                        htmlText = htmlText.split(`url('${url2}')`).join(`url('${blobUrl}')`);
                        htmlText = htmlText.split(`url("${url2}")`).join(`url("${blobUrl}")`);
                    }

                    // Tự động phân tích tìm chiều cao, chiều rộng và inject vào frame
                    const size = getBannerSize(htmlText);
                    renderBanner(htmlText, filename, size);
                }

            } catch (error) {
                console.error(error);
                alert("Lỗi khi đọc file: " + file.name);
            }
        }

        function renderBanner(htmlContent, filePath, size) {
            const item = document.createElement('div');
            item.className = 'banner-item';

            const wrapper = document.createElement('div');
            wrapper.className = 'iframe-wrapper';
            // Cập nhật width/height chuẩn xác cho bao bì ngoài iframe
            wrapper.style.width = size.width + 'px';
            wrapper.style.height = size.height + 'px';

            const iframe = document.createElement('iframe');
            iframe.srcdoc = htmlContent;
            iframe.scrolling = "no"; // Tắt thanh cuộn để tránh mất thẩm mỹ

            const title = document.createElement('div');
            title.className = 'banner-name';
            // Tên file (bao gồm tên thư mục nếu có) và kích thước đi kèm ở dưới
            title.innerText = `${filePath} (${size.width}x${size.height})`;

            wrapper.appendChild(iframe);
            item.appendChild(wrapper);
            item.appendChild(title);
            
            // Nối tiếp (Append) vào cuối để có thể ném nhiều zip cùng lúc
            gallery.appendChild(item); 
        }
    </script>
</body>
</html>
