<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Banner Viewer</title>
    <!-- Thư viện giải nén ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Thư viện chụp màn hình -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            background-color: #ffffff;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }

        body.dragover {
            background-color: #f8fafc;
        }
        body.dragover::after {
            content: '';
            position: fixed;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 3px dashed #000;
            pointer-events: none;
            z-index: 9999;
        }

        #instruction {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 1.2rem;
            text-align: center;
            pointer-events: none;
            z-index: 0;
        }

        #file-input { display: none; }

        #gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px; /* Đã giảm 1 nửa khoảng cách (từ 40px xuống 20px) */
            width: 100%;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }

        .banner-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .iframe-wrapper {
            border: 1px solid #000;
            background-color: #fff;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Thanh control chứa [X] [Tên] [Refresh] */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 5px;
            gap: 6px;
        }

        .banner-name {
            font-size: 10.4px; /* Nhỏ lại 20% so với 13px cũ */
            color: #000;
            font-family: monospace;
            text-align: left; /* Canh trái */
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-icon {
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            background: none;
            border: 1px solid #000;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            user-select: none;
            transition: all 0.2s;
        }
        .btn-icon:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="instruction">
        Kéo thả file ZIP hoặc file HTML vào bất kỳ đâu trên trang
        <br>
        <span style="font-size: 0.9rem; cursor: pointer; pointer-events: auto; text-decoration: underline;" onclick="document.getElementById('file-input').click()">
            hoặc click để chọn file
        </span>
    </div>
    
    <input type="file" id="file-input" accept=".zip, .html" multiple>
    <div id="gallery"></div>

    <script>
        const body = document.body;
        const fileInput = document.getElementById('file-input');
        const gallery = document.getElementById('gallery');
        const instruction = document.getElementById('instruction');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            body.addEventListener(eventName, e => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        body.addEventListener('dragenter', () => body.classList.add('dragover'));
        body.addEventListener('dragover', () => body.classList.add('dragover'));
        body.addEventListener('dragleave', (e) => {
            if (e.target === body) body.classList.remove('dragover');
        });

        body.addEventListener('drop', (e) => {
            body.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
            this.value = ''; 
        });

        function handleFiles(files) {
            let validFileFound = false;
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.name.toLowerCase().endsWith('.zip')) {
                    validFileFound = true;
                    processZip(file);
                } else if (file.name.toLowerCase().endsWith('.html')) {
                    // Hỗ trợ thả trực tiếp file HTML
                    validFileFound = true;
                    processHtmlFile(file);
                }
            }
            if (validFileFound) instruction.style.display = 'none';
        }

        // Đọc trực tiếp file HTML thả vào
        async function processHtmlFile(file) {
            try {
                let htmlText = await file.text();
                const size = getBannerSize(htmlText);
                htmlText = injectFreezeScript(htmlText); // Bơm script đóng băng + chụp ảnh
                renderBanner(htmlText, file.name, size);
            } catch(e) {
                console.error(e);
            }
        }

        async function processZip(file) {
            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(file);
                
                const fileBlobs = {};
                const htmlFiles =[];

                for (const filename of Object.keys(contents.files)) {
                    if (filename.includes('__MACOSX') || filename.includes('.DS_Store')) continue;
                    
                    const fileObj = contents.files[filename];
                    if (!fileObj.dir) {
                        if (filename.endsWith('.html')) {
                            htmlFiles.push(filename);
                        } else {
                            const ext = filename.split('.').pop().toLowerCase();
                            const mimeMap = { svg:'image/svg+xml', png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg', gif:'image/gif', css:'text/css', js:'text/javascript' };
                            const mimeType = mimeMap[ext] || 'application/octet-stream';
                            
                            const uint8array = await fileObj.async("uint8array");
                            const blob = new Blob([uint8array], { type: mimeType });
                            fileBlobs[filename] = URL.createObjectURL(blob);
                        }
                    }
                }

                for (const filename of htmlFiles) {
                    let htmlText = await contents.files[filename].async("text");
                    const basePath = filename.substring(0, filename.lastIndexOf('/') + 1);

                    for (const assetPath in fileBlobs) {
                        let relativePath = assetPath.startsWith(basePath) ? assetPath.substring(basePath.length) : assetPath;
                        const blobUrl = fileBlobs[assetPath];
                        
                        htmlText = htmlText.split(`"${relativePath}"`).join(`"${blobUrl}"`);
                        htmlText = htmlText.split(`'${relativePath}'`).join(`'${blobUrl}'`);
                        htmlText = htmlText.split(`"./${relativePath}"`).join(`"${blobUrl}"`);
                        htmlText = htmlText.split(`'./${relativePath}'`).join(`'${blobUrl}'`);
                        
                        htmlText = htmlText.split(`url(${relativePath})`).join(`url(${blobUrl})`);
                        htmlText = htmlText.split(`url('${relativePath}')`).join(`url('${blobUrl}')`);
                        htmlText = htmlText.split(`url("${relativePath}")`).join(`url("${blobUrl}")`);
                    }

                    const size = getBannerSize(htmlText);
                    htmlText = injectFreezeScript(htmlText); // Bơm script
                    
                    // Nếu ZIP chỉ có 1 html, lấy tên ZIP. Nếu nhiều file, ghép tên Zip và tên file html.
                    const displayName = htmlFiles.length === 1 ? file.name : `${file.name} - ${filename.split('/').pop()}`;
                    renderBanner(htmlText, displayName, size);
                }
            } catch (error) {
                console.error(error);
                alert("Lỗi khi đọc file: " + file.name);
            }
        }

        function getBannerSize(html) {
            let width = 300, height = 250;
            const metaMatch = html.match(/<meta\s+[^>]*name=["']ad\.size["'][^>]*>/i);
            if (metaMatch) {
                const contentMatch = metaMatch[0].match(/content=["']([^"']+)["']/i);
                if (contentMatch) {
                    const w = contentMatch[1].match(/width\s*=\s*(\d+)/i);
                    const h = contentMatch[1].match(/height\s*=\s*(\d+)/i);
                    if (w) width = parseInt(w[1], 10);
                    if (h) height = parseInt(h[1], 10);
                }
            } else {
                const canvasMatch = html.match(/<canvas[^>]*width=["'](\d+)["'][^>]*height=["'](\d+)["'][^>]*>/i);
                if (canvasMatch) {
                    width = parseInt(canvasMatch[1], 10);
                    height = parseInt(canvasMatch[2], 10);
                }
            }
            return { width, height };
        }

        // Bơm script vào HTML để bắt sự kiện Ctrl+Click và Dừng Animation
        function injectFreezeScript(html) {
            const script = `
            <script>
                // Lắng nghe Ctrl + Click để báo cho trình duyệt mẹ chụp ảnh
                window.addEventListener('click', function(e) {
                    if (e.ctrlKey) {
                        e.preventDefault(); e.stopPropagation();
                        window.parent.postMessage({ action: 'ctrl-click' }, '*');
                    }
                }, true);

                // Hàm ép buộc toàn bộ animation dừng lại
                window.freezeBanner = function() {
                    // Dừng CSS Animation
                    const style = document.createElement('style');
                    style.innerHTML = '*, *::before, *::after { animation-play-state: paused !important; transition: none !important; }';
                    document.head.appendChild(style);
                    // Dừng GSAP
                    if(window.gsap) window.gsap.globalTimeline.pause();
                    if(window.TweenMax) window.TweenMax.pauseAll();
                    // Dừng CreateJS (Adobe Animate)
                    if(window.createjs && window.createjs.Ticker) window.createjs.Ticker.paused = true;
                };
            <\/script>`;
            
            if (html.toLowerCase().includes('<head>')) {
                return html.replace(/<head>/i, '<head>' + script);
            }
            return script + html;
        }

        // Lắng nghe Message từ Banner gửi ra khi bấm Ctrl + Click
        window.addEventListener('message', async (e) => {
            if (e.data && e.data.action === 'ctrl-click') {
                const iframes = document.querySelectorAll('iframe');
                let targetIframe = null;

                // 1. Dừng TẤT CẢ các banner đang chạy lại ngay khung cảnh đó
                iframes.forEach(ifr => {
                    if (ifr.contentWindow === e.source) targetIframe = ifr;
                    try { ifr.contentWindow.freezeBanner(); } catch(err){}
                });

                // 2. Tiến hành chụp hình frame đó
                if (targetIframe) {
                    try {
                        const wrapperToCapture = targetIframe.parentNode;
                        const canvas = await html2canvas(wrapperToCapture, {
                            useCORS: true, 
                            allowTaint: true,
                            backgroundColor: null
                        });
                        
                        const link = document.createElement('a');
                        link.download = `banner_screenshot_${Date.now()}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch (err) {
                        alert("Lỗi chụp ảnh: " + err.message);
                    }
                }
            }
        });

        function renderBanner(htmlContent, displayName, size) {
            const item = document.createElement('div');
            item.className = 'banner-item';

            const wrapper = document.createElement('div');
            wrapper.className = 'iframe-wrapper';
            wrapper.style.width = size.width + 'px';
            wrapper.style.height = size.height + 'px';

            let iframe = document.createElement('iframe');
            iframe.srcdoc = htmlContent;
            iframe.scrolling = "no";
            wrapper.appendChild(iframe);

            const controls = document.createElement('div');
            controls.className = 'controls-row';
            controls.style.width = size.width + 'px'; // Fix width thanh công cụ bằng đúng size banner

            // Nút Tắt (X)
            const btnClose = document.createElement('button');
            btnClose.className = 'btn-icon';
            btnClose.innerText = 'X';
            btnClose.title = "Đóng banner này";
            btnClose.onclick = () => item.remove();

            // Tên Banner
            const title = document.createElement('div');
            title.className = 'banner-name';
            title.title = displayName; // Hover để xem full text nếu bị cắt
            title.innerText = `${displayName}`; 

            // Nút Chạy Lại (Refresh)
            const btnRefresh = document.createElement('button');
            btnRefresh.className = 'btn-icon';
            btnRefresh.innerText = '↻';
            btnRefresh.title = "Chạy lại (Refresh)";
            btnRefresh.onclick = () => {
                // Thay thế iframe bằng 1 bản sao mới để restart animation sạch sẽ
                const newIframe = document.createElement('iframe');
                newIframe.srcdoc = htmlContent;
                newIframe.scrolling = "no";
                iframe.replaceWith(newIframe);
                iframe = newIframe;
            };

            controls.appendChild(btnClose);
            controls.appendChild(title);
            controls.appendChild(btnRefresh);

            item.appendChild(wrapper);
            item.appendChild(controls);
            gallery.appendChild(item); 
        }
    </script>
</body>
</html>
